name: Unity Interop xUnit Tests

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        build_type: [Debug]

    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout connected-spaces-platform-unity
        uses: actions/checkout@v4
        with:
          repository: magnopus-opensource/connected-spaces-platform-unity
          path: connected-spaces-platform-unity

      - name: Download CSP artifacts from TeamCity
        shell: bash
        env:
          TC_TOKEN: ${{ secrets.TEAMCITY_TOKEN }}
        run: |
          mkdir -p CSP
          base="https://magnopus.teamcity.com/repository/download/Olympus_Foundation_X64_DebugDLLCSharp/.lastSuccessful/DebugDLL-CSharp"
          curl -fSL -H "Authorization: Bearer $TC_TOKEN" -o include.zip "$base/include.zip"
          curl -fSL -H "Authorization: Bearer $TC_TOKEN" -o lib.zip     "$base/lib.zip"
          unzip -o include.zip -d CSP
          unzip -o lib.zip     -d CSP

      # ENABLE_UNITY_EXTENSIONS must be OFF so xUnit tests can build — with
      # Unity extensions enabled the SWIG bindings reference Unity types that
      # are not available outside the editor.
      - name: Configure
        working-directory: connected-spaces-platform-unity
        run: cmake -S . -B build -DENABLE_UNITY_EXTENSIONS=OFF -DCSP_ROOT_DIR="$GITHUB_WORKSPACE/CSP"

      - name: Build
        working-directory: connected-spaces-platform-unity
        env:
          CMAKE_BUILD_PARALLEL_LEVEL: ${{ runner.job_count }}
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Install
        working-directory: connected-spaces-platform-unity
        run: cmake --install build --config ${{ matrix.build_type }}

      - name: Test
        working-directory: connected-spaces-platform-unity/InteropTestsXUnit
        env:
          RUN_LONG_RUNNING_TESTS: 1
        run: dotnet test -c ${{ matrix.build_type }} --logger "console;verbosity=detailed" --blame-hang --blame-hang-timeout 90s
